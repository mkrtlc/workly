name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.pull_request.user.login;

            // Check if this is their first PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const prsByUser = prs.filter(pr => pr.user.login === creator);

            if (prsByUser.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `Thanks for your first contribution to Workly, @${creator}!\n\nI'll review your PR as soon as I can. In the meantime, make sure you've:\n\n- [ ] Tested your changes by loading the extension locally\n- [ ] Checked that existing functionality still works\n- [ ] Included the site URL you tested on (for parser changes)\n\nSee [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md) for guidelines.`
              });
            }

  welcome-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;

            // Check if this is their first issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: creator,
              per_page: 5
            });

            if (issues.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `Thanks for opening your first issue, @${creator}! I'll take a look as soon as I can.\n\nIf this is a bug report, including the product page URL and a screenshot helps a lot.`
              });
            }

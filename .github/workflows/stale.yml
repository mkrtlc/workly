name: Close Stale Issues & PRs

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity for 30 days. It will be closed in 7 days if no further
            activity occurs. If this is still relevant, please leave a comment.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            any activity for 21 days. It will be closed in 7 days if no further
            activity occurs. If you're still working on this, please leave a comment or push new commits.
          close-issue-message: 'Closed due to inactivity. Feel free to reopen if this is still relevant.'
          close-pr-message: 'Closed due to inactivity. Feel free to reopen if you want to continue working on this.'
          days-before-stale: 30
          days-before-close: 7
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned'
